<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>F1 Apex HUD Wallpaper</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Ambient background -->
  <div class="aurora" id="aurora-bg"></div>
  <div class="grid-overlay"></div>

  <!-- Center Clock (prominent wallpaper centerpiece) -->
  <div class="center-clock-wrap" id="center-clock-wrap">
    <div class="clock-time" id="digital-clock">00:00:00</div>
    <div class="clock-date" id="date-display">Friday, July 3, 2026</div>

    <!-- Informative upcoming event card -->
    <div class="next-event-card" id="next-event-card">
      <div class="next-event-top">
        <span class="next-event-dot"></span>
        <span class="next-event-session" id="next-session-name">Practice 1</span>
        <span class="next-event-countdown" id="next-session-countdown">--:--:--</span>
      </div>
      <div class="next-event-bottom">
        <img class="next-event-flag" id="next-session-flag" src="" alt="">
        <span class="next-event-circuit" id="next-session-circuit">Circuit Name</span>
        <span class="next-event-time" id="next-session-time">—</span>
      </div>
    </div>
  </div>

  <!-- Schedule panel (right side, fixed) -->
  <aside class="right-panel glass" id="right-panel">
    <header class="panel-header">
      <span class="panel-title">F1 2026 Calendar</span>
      <span class="panel-subtitle">Live &amp; Next Up</span>
    </header>
    <section class="schedule-content" id="schedule-content">

      <!-- LIVE NOW block (0..n sessions currently in progress) -->
      <div class="session-block" id="live-block">
        <div class="block-label"><span class="pulse-dot"></span>Live Now</div>
        <div class="session-card live-card" id="live-card">
          <div class="sc-header">
            <img class="sc-flag" id="live-flag" src="" alt="">
            <div class="sc-titles">
              <div class="sc-country" id="live-country">—</div>
              <div class="sc-track" id="live-track">—</div>
            </div>
            <span class="live-pill">● LIVE</span>
          </div>
          <div class="sc-session-name" id="live-session-name">—</div>
          <div class="sc-time-row">
            <span class="sc-local-time" id="live-local-time">—</span>
          </div>
          <div class="sc-progress-track">
            <div class="sc-progress-fill" id="live-progress-fill"></div>
          </div>
        </div>
      </div>

      <!-- UPCOMING block (exactly 1 session: the very next on the calendar) -->
      <div class="session-block" id="upcoming-block">
        <div class="block-label">Upcoming</div>
        <div class="session-card upcoming-card" id="upcoming-card">
          <div class="sc-header">
            <img class="sc-flag" id="up-flag" src="" alt="">
            <div class="sc-titles">
              <div class="sc-country" id="up-country">—</div>
              <div class="sc-track" id="up-track">—</div>
            </div>
          </div>
          <div class="sc-session-name" id="up-session-name">—</div>
          <div class="sc-local-time" id="up-local-time">—</div>
          <div class="countdown-chips">
            <div class="chip"><span class="chip-num" id="up-d">00</span><span class="chip-lbl">Days</span></div>
            <div class="chip"><span class="chip-num" id="up-h">00</span><span class="chip-lbl">Hrs</span></div>
            <div class="chip"><span class="chip-num" id="up-m">00</span><span class="chip-lbl">Min</span></div>
            <div class="chip"><span class="chip-num" id="up-s">00</span><span class="chip-lbl">Sec</span></div>
          </div>
        </div>
      </div>

      <!-- Season complete fallback -->
      <div class="session-block season-complete-block" id="season-complete-block">
        <div class="session-card">
          <div class="sc-session-name">Season Complete</div>
          <div class="sc-local-time">See you in 2027 🏁</div>
        </div>
      </div>

    </section>
  </aside>

  <!-- Media / Audio detect (bottom-right, fixed) -->
  <section class="media-widget glass waiting-media" id="media-panel">
    <div class="media-placeholder" id="media-placeholder-id">
      <div class="music-wave"><span></span><span></span><span></span><span></span><span></span></div>
      <p>Awaiting Media...</p>
    </div>
    <div class="media-content hidden" id="media-content-id">
      <div class="thumb-wrap">
        <img class="album-art" id="media-album-art" src="" alt="Album Art" crossorigin="anonymous">
        <div class="thumb-eq"><span></span><span></span><span></span></div>
      </div>
      <div class="media-info">
        <span class="media-now-playing">Now Playing</span>
        <div class="media-title-wrap"><h2 class="media-title" id="media-title">Track</h2></div>
        <div class="media-artist-wrap"><p class="media-artist" id="media-artist">Artist</p></div>
        <div class="media-progress">
          <span class="time-lbl" id="media-time-current">0:00</span>
          <div class="progress-track"><div class="progress-fill" id="media-timeline-fill"></div></div>
          <span class="time-lbl" id="media-time-total">0:00</span>
        </div>
      </div>
    </div>
  </section>

  <!-- Color theme selector (bottom-center, fixed) -->
  <div class="color-bar glass" id="color-bar">
    <span class="color-bar-label">Theme</span>
    <div class="color-swatches" id="color-swatches"></div>

    <div class="bar-divider"></div>

    <span class="color-bar-label">Motif</span>
    <div class="motif-selector" id="motif-selector">
      <button class="motif-btn active" data-motif="clean" title="Clean">Clean</button>
      <button class="motif-btn" data-motif="grid" title="Cyber Grid">Cyber Grid</button>
      <button class="motif-btn" data-motif="waves" title="Soft Waves">Soft Waves</button>
    </div>
  </div>

  <!-- Audio visualizer -->
  <canvas class="visualizer" id="audio-visualizer-canvas" width="1920" height="120"></canvas>

  <script src="script.js"></script>
</body>
</html>
