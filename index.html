<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="F1 2026 Race Calendar with full session schedules, live countdowns, media player, and audio visualizer for Wallpaper Engine.">
  <title>F1 Racing Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Ambient background glow -->
  <div class="ambient-glow" id="ambient-glow-bg"></div>
  <div class="grid-overlay"></div>

  <!-- Right-side panel -->
  <aside class="right-panel" id="right-panel">

    <!-- Clock -->
    <header class="clock-block">
      <div class="clock-time" id="digital-clock">00:00:00</div>
      <div class="clock-date" id="date-display">Friday, July 3, 2026</div>
    </header>

    <!-- Full F1 Schedule (scrollable) -->
    <section class="schedule-scroll" id="schedule-scroll">
      <!-- Dynamically built by script.js -->
    </section>

  </aside>

  <!-- Bottom-right media player -->
  <section class="media-widget waiting-media" id="media-panel">
    <div class="media-placeholder" id="media-placeholder-id">
      <div class="music-wave"><span></span><span></span><span></span><span></span></div>
      <p>Awaiting Media...</p>
    </div>
    <div class="media-content hidden" id="media-content-id">
      <div class="thumb-wrap">
        <img class="album-art" id="media-album-art" src="" alt="Album Art" crossorigin="anonymous">
      </div>
      <div class="media-info">
        <div class="media-title-wrap"><h2 class="media-title" id="media-title">Track</h2></div>
        <div class="media-artist-wrap"><p class="media-artist" id="media-artist">Artist</p></div>
        <div class="media-progress">
          <span class="time-lbl" id="media-time-current">0:00</span>
          <div class="progress-track"><div class="progress-fill" id="media-timeline-fill"></div></div>
          <span class="time-lbl" id="media-time-total">0:00</span>
        </div>
      </div>
    </div>
  </section>

  <!-- Audio visualizer -->
  <canvas class="visualizer" id="audio-visualizer-canvas" width="1920" height="120"></canvas>

  <script src="script.js"></script>
</body>
</html>
